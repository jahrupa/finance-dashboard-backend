version: "3.9"

services:
  ap-backend:
    image: ap-backend:prod
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-backend-prod
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ap-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7.0
    container_name: ap-mongo-prod
    restart: always
    # No port exposure — only internal network access
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ap-dashboard
    volumes:
      - mongo_data:/data/db
    networks:
      - ap-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

networks:
  ap-network:
    driver: bridge
