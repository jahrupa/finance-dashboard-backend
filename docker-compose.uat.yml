version: "3.9"

services:
  ap-backend:
    image: ap-backend:uat
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-backend-uat
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.uat
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ap-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7.0
    container_name: ap-mongo-uat
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ap-dashboard
    volumes:
      - mongo_data:/data/db
    networks:
      - ap-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  uploads_data:

networks:
  ap-network:
    driver: bridge
